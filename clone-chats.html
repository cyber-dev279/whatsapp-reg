<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>clone app · Chats</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Apple Color Emoji', system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background: #0D1117;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        .clone-app {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background: #161B22;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .clone-header {
            background: #161B22;
            padding: 18px 18px 8px 18px;
            color: #F0F6FC;
            border-bottom: 1px solid #21262D;
            flex-shrink: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .clone-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header-icons {
            display: flex;
            gap: 20px;
            font-size: 20px;
            color: #C9D1D9;
        }

        .header-icons i {
            cursor: pointer;
        }

        .clone-tabs {
            display: flex;
            margin-top: 8px;
            gap: 24px;
            border-bottom: 1px solid #21262D;
        }

        .clone-tab {
            padding: 8px 0 12px 0;
            font-size: 15px;
            font-weight: 600;
            color: #8B949E;
            position: relative;
            cursor: pointer;
        }

        .clone-tab.active {
            color: #F0F6FC;
        }

        .clone-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #2F81F7;
            border-radius: 2px;
        }

        .badge {
            background-color: #238636;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px;
            margin-left: 8px;
        }

        .search-section {
            background: #161B22;
            padding: 10px 16px;
            border-bottom: 1px solid #21262D;
            flex-shrink: 0;
            z-index: 10;
        }

        .clone-search {
            background-color: #0D1117;
            border-radius: 24px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #6E7681;
            border: 1px solid #21262D;
        }

        .clone-search i {
            font-size: 18px;
        }

        .clone-search input {
            background: transparent;
            border: none;
            width: 100%;
            font-size: 15px;
            color: #F0F6FC;
            outline: none;
        }

        .clone-search input::placeholder {
            color: #6E7681;
        }

        .chats-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #161B22;
        }

        .chat-list {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding-bottom: 10px;
        }

        .chat-list.blurred {
            filter: blur(8px);
            pointer-events: none;
            user-select: none;
            opacity: 0.6;
        }

        /* Full overlay - covers everything and prevents scrolling */
        .loading-overlay-clone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(22, 27, 34, 0.98);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            opacity: 1;
            visibility: visible;
            pointer-events: all;
        }

        .clone-loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #21262D;
            border-top: 4px solid #2F81F7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 18px;
        }

        .loading-text {
            color: #F0F6FC;
            font-size: 16px;
            font-weight: 500;
            background: #21262D;
            padding: 6px 20px;
            border-radius: 40px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid #21262D;
        }

        .chat-item:hover {
            background-color: #21262D;
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #238636;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: white;
            margin-right: 14px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .chat-name {
            font-weight: 700;
            color: #F0F6FC;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .chat-time {
            color: #6E7681;
            font-size: 11px;
            white-space: nowrap;
            margin-left: 8px;
        }

        .message-preview {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #8B949E;
            font-size: 13px;
        }

        .preview-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .unread-dot {
            width: 10px;
            height: 10px;
            background-color: #2F81F7;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
        }

        .clone-bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #161B22;
            padding: 8px 12px 12px;
            border-top: 1px solid #21262D;
            flex-shrink: 0;
            z-index: 10;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8B949E;
            cursor: pointer;
            gap: 4px;
            font-size: 12px;
            transition: color 0.1s;
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item.active {
            color: #2F81F7;
        }

        .clone-fab {
            position: absolute;
            bottom: 72px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: #238636;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            z-index: 40;
            transition: transform 0.1s;
        }

        .clone-fab:active {
            transform: scale(0.94);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: #161B22;
            border-radius: 28px;
            padding: 28px 24px;
            max-width: 320px;
            width: 85%;
            text-align: center;
            box-shadow: 0 8px 26px rgba(0, 0, 0, 0.5);
            border: 1px solid #21262D;
        }

        .modal-icon {
            font-size: 54px;
            color: #8B949E;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #F0F6FC;
            margin-bottom: 12px;
        }

        .modal-text {
            color: #8B949E;
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 28px;
        }

        .modal-button {
            background: #238636;
            border: none;
            padding: 12px 0;
            width: 100%;
            border-radius: 28px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }

        /* Scrollbar styling */
        .chat-list::-webkit-scrollbar {
            width: 5px;
        }
        .chat-list::-webkit-scrollbar-track {
            background: #161B22;
        }
        .chat-list::-webkit-scrollbar-thumb {
            background: #21262D;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="clone-app">
    <div class="clone-header">
        <div class="header-top">
            <div class="clone-title">clone app</div>
            <div class="header-icons">
                <i class="fas fa-camera"></i>
                <i class="fas fa-search"></i>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </div>
        <div class="clone-tabs">
            <div class="clone-tab active">Chats</div>
            <div class="clone-tab">Status <span class="badge">3</span></div>
            <div class="clone-tab">Calls</div>
        </div>
    </div>

    <div class="search-section">
        <div class="clone-search">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search or start new chat" id="searchInput">
        </div>
    </div>

    <div class="chats-wrapper" id="chatsWrapper">
        <!-- Full overlay - completely covers chat list, prevents scrolling -->
        <div class="loading-overlay-clone" id="cloneLoadingOverlay">
            <div class="clone-loading-spinner"></div>
            <div class="loading-text">⏳ loading offline content</div>
        </div>
        <div class="chat-list" id="chatListContainer"></div>
    </div>

    <div class="clone-bottom-nav">
        <div class="nav-item active" data-nav="chats">
            <i class="fas fa-comment-dots"></i>
            <span>Chats</span>
        </div>
        <div class="nav-item" data-nav="updates">
            <i class="fas fa-circle-notch"></i>
            <span>Updates</span>
        </div>
        <div class="nav-item" data-nav="communities">
            <i class="fas fa-users"></i>
            <span>Communities</span>
        </div>
        <div class="nav-item" data-nav="calls">
            <i class="fas fa-phone"></i>
            <span>Calls</span>
        </div>
    </div>

    <div class="clone-fab" id="fabNewChat">
        <i class="fas fa-comment-medical"></i>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-icon"><i class="fas fa-ban"></i></div>
            <div class="modal-title">Chat deleted</div>
            <div class="modal-text">This conversation has been deleted or is no longer available.<br>Start a new chat to continue.</div>
            <button class="modal-button" id="closeModalBtn">OK</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const contactNames = [
            "Alex Chen", "Jamie Rivera", "Taylor Wong", "Jordan Smith", 
            "Casey Brown", "Riley Johnson", "Morgan Lee", "Cameron Davis", 
            "Quinn Taylor", "Blake Wilson", "Avery Martinez", "Dakota Anderson"
        ];
        
        const msgPool = [
            "Hey! Are we still meeting today? 👋", 
            "Can you call me when you're free? 📞",
            "Just saw your message - will reply soon!",
            "The meeting got moved to 3pm ⏰",
            "I'll be there in 10 minutes 🚗",
            "Did you see the latest update?",
            "Can you help me with something? 🙏",
            "What do you think about this?",
            "Beautiful weather today! ☀️",
            "Don't forget about the deadline tomorrow",
            "Want to grab lunch? 🍕",
            "I finished the report ✅",
            "Can we reschedule?",
            "That concert was amazing! 🎵",
            "Any plans for the weekend?",
            "The new restaurant is great 🍽️",
            "On my way! 🚶",
            "Let's discuss this later",
            "Happy Birthday! 🎂",
            "See you soon! 👋"
        ];
        
        function getRandomTime() {
            const randomHour = Math.floor(Math.random() * 12) + 1;
            const randomMinute = Math.floor(Math.random() * 60);
            const ampm = randomHour >= 12 ? 'PM' : 'AM';
            const hour12 = randomHour % 12 || 12;
            const minuteStr = randomMinute < 10 ? '0' + randomMinute : randomMinute;
            const isYesterday = Math.random() > 0.7;
            if (isYesterday) return `Yesterday`;
            return `${hour12}:${minuteStr} ${ampm}`;
        }
        
        function getRandomPreview() {
            return msgPool[Math.floor(Math.random() * msgPool.length)];
        }
        
        function getInitials(name) {
            return name.split(' ').map(word => word[0]).join('').toUpperCase().slice(0,2);
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function buildChatList() {
            const container = document.getElementById('chatListContainer');
            if (!container) return;
            container.innerHTML = '';
            
            contactNames.forEach((name, idx) => {
                const previewText = getRandomPreview();
                const time = getRandomTime();
                const hasUnread = idx < 3 ? true : (idx === 5 ? true : false);
                const initials = getInitials(name);
                
                const chatDiv = document.createElement('div');
                chatDiv.className = 'chat-item';
                chatDiv.setAttribute('data-name', name);
                
                chatDiv.innerHTML = `
                    <div class="chat-avatar">${escapeHtml(initials)}</div>
                    <div class="chat-info">
                        <div class="chat-row">
                            <div class="chat-name">${escapeHtml(name)}</div>
                            <div class="chat-time">${time}</div>
                        </div>
                        <div class="message-preview">
                            <div class="preview-text">${escapeHtml(previewText)}</div>
                            ${hasUnread ? '<span class="unread-dot"></span>' : ''}
                        </div>
                    </div>
                `;
                
                chatDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const modal = document.getElementById('modalOverlay');
                    if (modal) modal.classList.add('active');
                });
                
                container.appendChild(chatDiv);
            });
        }
        
        function initApp() {
            buildChatList();
            // Loading overlay stays active forever - fully covers the content
            // No timeout to remove it
        }
        
        const modal = document.getElementById('modalOverlay');
        const closeBtn = document.getElementById('closeModalBtn');
        if (closeBtn) {
            closeBtn.addEventListener('click', () => {
                modal.classList.remove('active');
            });
        }
        if (modal) {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.remove('active');
            });
        }
        
        const fab = document.getElementById('fabNewChat');
        if (fab) {
            fab.addEventListener('click', () => {
                alert("📱 Start a new chat — This would open contact picker.");
            });
        }
        
        const tabs = document.querySelectorAll('.clone-tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                if (this.innerText.includes('Status')) {
                    alert("📸 Status updates — feature demo.");
                } else if (this.innerText.includes('Calls')) {
                    alert("📞 Calls log — feature demo.");
                }
            });
        });
        
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', function() {
                navItems.forEach(nav => nav.classList.remove('active'));
                this.classList.add('active');
                const navType = this.getAttribute('data-nav');
                if (navType === 'updates') alert("Updates & channels");
                else if (navType === 'communities') alert("Communities");
                else if (navType === 'calls') alert("Call history");
            });
        });
        
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                const chatItems = document.querySelectorAll('.chat-item');
                chatItems.forEach(item => {
                    const nameElem = item.querySelector('.chat-name');
                    if (nameElem) {
                        const name = nameElem.innerText.toLowerCase();
                        if (query === '' || name.includes(query)) {
                            item.style.display = 'flex';
                        } else {
                            item.style.display = 'none';
                        }
                    }
                });
            });
        }
        
        initApp();
    })();
</script>
</body>
</html>
