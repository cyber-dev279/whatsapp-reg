<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Clone App · Chats</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Apple Color Emoji', system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
        }

        .clone-app {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background: #16213e;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .clone-header {
            background: #0f3460;
            padding: 18px 18px 8px 18px;
            color: white;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .clone-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header-icons {
            display: flex;
            gap: 20px;
            font-size: 20px;
        }

        .header-icons i {
            cursor: pointer;
        }

        .clone-tabs {
            display: flex;
            margin-top: 8px;
            gap: 24px;
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }

        .clone-tab {
            padding: 8px 0 12px 0;
            font-size: 15px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            position: relative;
            cursor: pointer;
        }

        .clone-tab.active {
            color: white;
        }

        .clone-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #e94560;
            border-radius: 2px;
        }

        .badge {
            background-color: #e94560;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px;
            margin-left: 8px;
        }

        .search-section {
            background: #16213e;
            padding: 10px 16px;
            border-bottom: 1px solid #1e4976;
        }

        .clone-search {
            background-color: #0f3460;
            border-radius: 24px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            border: 1px solid #1e4976;
        }

        .clone-search i {
            font-size: 18px;
        }

        .clone-search input {
            background: transparent;
            border: none;
            width: 100%;
            font-size: 15px;
            color: white;
            outline: none;
        }

        .clone-search input::placeholder {
            color: #94a3b8;
        }

        .chats-wrapper {
            flex: 1;
            position: relative;
            overflow-y: auto;
            background: #16213e;
        }

        .chat-list {
            transition: filter 0.3s ease, opacity 0.2s ease;
            width: 100%;
        }

        .chat-list.blurred {
            filter: blur(6px);
            pointer-events: none;
            user-select: none;
            opacity: 0.75;
        }

        .loading-overlay-clone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(22, 33, 62, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.2s;
            pointer-events: none;
        }

        .loading-overlay-clone.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .clone-loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #1e4976;
            border-top: 4px solid #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 18px;
        }

        .loading-text {
            color: white;
            font-size: 16px;
            font-weight: 500;
            background: #0f3460;
            padding: 6px 20px;
            border-radius: 40px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid #1e4976;
        }

        .chat-item:hover {
            background-color: #0f3460;
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: white;
            margin-right: 14px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .chat-name {
            font-weight: 700;
            color: white;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .chat-time {
            color: #94a3b8;
            font-size: 11px;
            white-space: nowrap;
            margin-left: 8px;
        }

        .message-preview {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #94a3b8;
            font-size: 13px;
        }

        .preview-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .unread-dot {
            width: 10px;
            height: 10px;
            background-color: #e94560;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
        }

        .clone-bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #0f3460;
            padding: 8px 12px 12px;
            border-top: 1px solid #1e4976;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #94a3b8;
            cursor: pointer;
            gap: 4px;
            font-size: 12px;
            transition: color 0.1s;
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item.active {
            color: #e94560;
        }

        .clone-fab {
            position: absolute;
            bottom: 72px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: #e94560;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            z-index: 40;
            transition: transform 0.1s;
        }

        .clone-fab:active {
            transform: scale(0.94);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: #16213e;
            border-radius: 28px;
            padding: 28px 24px;
            max-width: 320px;
            width: 85%;
            text-align: center;
            box-shadow: 0 8px 26px rgba(0, 0, 0, 0.5);
            border: 1px solid #1e4976;
        }

        .modal-icon {
            font-size: 54px;
            color: #94a3b8;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: white;
            margin-bottom: 12px;
        }

        .modal-text {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 28px;
        }

        .modal-button {
            background: #e94560;
            border: none;
            padding: 12px 0;
            width: 100%;
            border-radius: 28px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="clone-app">
    <div class="clone-header">
        <div class="header-top">
            <div class="clone-title">Clone App</div>
            <div class="header-icons">
                <i class="fas fa-camera"></i>
                <i class="fas fa-search"></i>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </div>
        <div class="clone-tabs">
            <div class="clone-tab active">Chats</div>
            <div class="clone-tab">Status <span class="badge">3</span></div>
            <div class="clone-tab">Calls</div>
        </div>
    </div>

    <div class="search-section">
        <div class="clone-search">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search or start new chat" id="searchInput">
        </div>
    </div>

    <div class="chats-wrapper" id="chatsWrapper">
        <div class="loading-overlay-clone" id="cloneLoadingOverlay">
            <div class="clone-loading-spinner"></div>
            <div class="loading-text">⏳ loading offline content</div>
        </div>
        <div class="chat-list" id="chatListContainer"></div>
    </div>

    <div class="clone-bottom-nav">
        <div class="nav-item active" data-nav="chats">
            <i class="fas fa-comment-dots"></i>
            <span>Chats</span>
        </div>
        <div class="nav-item" data-nav="updates">
            <i class="fas fa-circle-notch"></i>
            <span>Updates</span>
        </div>
        <div class="nav-item" data-nav="communities">
            <i class="fas fa-users"></i>
            <span>Communities</span>
        </div>
        <div class="nav-item" data-nav="calls">
            <i class="fas fa-phone"></i>
            <span>Calls</span>
        </div>
    </div>

    <div class="clone-fab" id="fabNewChat">
        <i class="fas fa-comment-medical"></i>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-icon"><i class="fas fa-ban"></i></div>
            <div class="modal-title">Chat deleted</div>
            <div class="modal-text">This conversation has been deleted or is no longer available.<br>Start a new chat to continue.</div>
            <button class="modal-button" id="closeModalBtn">OK</button>
        </div>
    </div>
</div>
