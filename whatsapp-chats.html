<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WhatsApp · Chats</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Apple Color Emoji', 'Segoe UI Emoji', system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background-color: #111b21;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
        }

        .wa-app {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background-color: #111b21;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .wa-header {
            background-color: #202c33;
            padding: 18px 18px 8px 18px;
            color: #e9edef;
            border-bottom: 1px solid #2a3942;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .wa-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header-icons {
            display: flex;
            gap: 20px;
            font-size: 20px;
            color: #aebac1;
        }

        .header-icons i {
            cursor: pointer;
            transition: color 0.2s;
        }

        .header-icons i:hover {
            color: #e9edef;
        }

        .wa-tabs {
            display: flex;
            margin-top: 8px;
            gap: 24px;
            border-bottom: 1px solid #2a3942;
        }

        .wa-tab {
            padding: 8px 0 12px 0;
            font-size: 15px;
            font-weight: 500;
            color: #aebac1;
            position: relative;
            cursor: pointer;
            transition: color 0.2s;
        }

        .wa-tab.active {
            color: #25d366;
        }

        .wa-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #25d366;
            border-radius: 2px;
        }

        .badge {
            background-color: #25d366;
            color: #111b21;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px;
            margin-left: 8px;
        }

        .search-section {
            background-color: #202c33;
            padding: 10px 16px;
        }

        .wa-search {
            background-color: #2a3942;
            border-radius: 24px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #6a7c86;
        }

        .wa-search i {
            font-size: 18px;
        }

        .wa-search input {
            background: transparent;
            border: none;
            width: 100%;
            font-size: 15px;
            color: #e9edef;
            outline: none;
        }

        .wa-search input::placeholder {
            color: #6a7c86;
        }

        .chats-wrapper {
            flex: 1;
            position: relative;
            overflow-y: auto;
            background-color: #111b21;
        }

        .chat-list {
            transition: filter 0.3s ease, opacity 0.2s ease;
            width: 100%;
        }

        .chat-list.blurred {
            filter: blur(6px);
            pointer-events: none;
            user-select: none;
            opacity: 0.75;
        }

        .loading-overlay-wa {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(17, 27, 33, 0.92);
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.2s;
            pointer-events: none;
        }

        .loading-overlay-wa.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .wa-loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #2a3942;
            border-top: 4px solid #25d366;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 18px;
        }

        .loading-text {
            color: #e9edef;
            font-size: 16px;
            font-weight: 500;
            background: #202c33cc;
            padding: 6px 20px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid #2a3942;
        }

        .chat-item:hover {
            background-color: #202c33;
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #2a3942;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 20px;
            color: #e9edef;
            margin-right: 14px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .chat-name {
            font-weight: 600;
            color: #e9edef;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .chat-time {
            color: #8696a0;
            font-size: 11px;
            white-space: nowrap;
            margin-left: 8px;
        }

        .message-preview {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #8696a0;
            font-size: 13px;
        }

        .preview-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .status-icon {
            font-size: 12px;
            color: #8696a0;
        }

        .status-icon.double-check {
            color: #53bdeb;
        }

        .status-icon.sent-check {
            color: #8696a0;
        }

        .unread-dot {
            width: 10px;
            height: 10px;
            background-color: #25d366;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
        }

        .wa-bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #202c33;
            padding: 8px 12px 12px;
            border-top: 1px solid #2a3942;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #aebac1;
            cursor: pointer;
            gap: 4px;
            font-size: 12px;
            transition: color 0.1s;
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item.active {
            color: #25d366;
        }

        .nav-item span {
            font-size: 11px;
            font-weight: 500;
        }

        .wa-fab {
            position: absolute;
            bottom: 72px;
            right: 20px;
            width: 56px;
            height: 56px;
            background-color: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #111b21;
            font-size: 28px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            z-index: 40;
            transition: transform 0.1s, background 0.2s;
        }

        .wa-fab:active {
            transform: scale(0.94);
            background-color: #20b559;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: #2a3942;
            border-radius: 28px;
            padding: 28px 24px;
            max-width: 320px;
            width: 85%;
            text-align: center;
            box-shadow: 0 8px 26px rgba(0, 0, 0, 0.5);
        }

        .modal-icon {
            font-size: 54px;
            color: #8696a0;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #e9edef;
            margin-bottom: 12px;
        }

        .modal-text {
            color: #aebac1;
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 28px;
        }

        .modal-button {
            background-color: #25d366;
            border: none;
            padding: 12px 0;
            width: 100%;
            border-radius: 28px;
            font-size: 15px;
            font-weight: 600;
            color: #111b21;
            cursor: pointer;
        }

        .modal-button:hover {
            background-color: #20b859;
        }

        .chats-wrapper::-webkit-scrollbar {
            width: 5px;
        }
        .chats-wrapper::-webkit-scrollbar-track {
            background: #111b21;
        }
        .chats-wrapper::-webkit-scrollbar-thumb {
            background: #3b4a54;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="wa-app">
    <div class="wa-header">
        <div class="header-top">
            <div class="wa-title">WhatsApp</div>
            <div class="header-icons">
                <i class="fas fa-camera"></i>
                <i class="fas fa-search"></i>
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </div>
        <div class="wa-tabs">
            <div class="wa-tab active">Chats</div>
            <div class="wa-tab">Status <span class="badge">3</span></div>
            <div class="wa-tab">Calls</div>
        </div>
    </div>

    <div class="search-section">
        <div class="wa-search">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search or start new chat" id="searchInput">
        </div>
    </div>

    <div class="chats-wrapper" id="chatsWrapper">
        <div class="loading-overlay-wa" id="waLoadingOverlay">
            <div class="wa-loading-spinner"></div>
            <div class="loading-text">⏳ loading offline content</div>
        </div>
        <div class="chat-list" id="chatListContainer"></div>
    </div>

    <div class="wa-bottom-nav">
        <div class="nav-item active" data-nav="chats">
            <i class="fas fa-comment-dots"></i>
            <span>Chats</span>
        </div>
        <div class="nav-item" data-nav="updates">
            <i class="fas fa-circle-notch"></i>
            <span>Updates</span>
        </div>
        <div class="nav-item" data-nav="communities">
            <i class="fas fa-users"></i>
            <span>Communities</span>
        </div>
        <div class="nav-item" data-nav="calls">
            <i class="fas fa-phone"></i>
            <span>Calls</span>
        </div>
    </div>

    <div class="wa-fab" id="fabNewChat">
        <i class="fas fa-comment-medical"></i>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-icon"><i class="fas fa-ban"></i></div>
            <div class="modal-title">Chat deleted</div>
            <div class="modal-text">This conversation has been deleted or is no longer available.<br>Start a new chat to continue.</div>
            <button class="modal-button" id="closeModalBtn">OK</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // --- ONLY CHANGED: Loading duration to 20 minutes ---
        const LOADING_DURATION_MS = 20 * 60 * 1000; // 20 minutes
        
        const contactNames = [
            "Hans Müller", "Lisa Schmidt", "Thomas Fischer", "Anna Weber", 
            "Michael Becker", "Sarah Wagner", "Martin Schulz", "Julia Hoffmann", 
            "Peter Schneider", "Claudia Meier", "Felix Richter", "Nina Klein"
        ];
        
        const germanMsgPool = [
            "Hast du die Unterlagen schon gesehen? 📄", 
            "Kannst du mich später anrufen? 📞",
            "Wo treffen wir uns heute?",
            "Das Meeting wurde verschoben ⏰",
            "Ich bin in 15 Minuten da 🚗",
            "Hast du die E-Mail erhalten?",
            "Kannst du mir helfen? 🙏",
            "Was ist deine Meinung dazu?",
            "Das Wetter ist heute schön ☀️",
            "Vergiss nicht, Milch zu kaufen 🥛",
            "Wollen wir morgen essen gehen? 🍕",
            "Ich habe den Bericht fertig ✅",
            "Kannst du bitte später schreiben?",
            "Das Konzert war fantastisch 🎵",
            "Hast du schon Pläne fürs Wochenende?",
            "Das Restaurant war sehr gut 🍽️",
            "Ich bin gerade unterwegs 🚶",
            "Können wir das besprechen?",
            "Alles Gute zum Geburtstag! 🎂",
            "Bis später! 👋"
        ];
        
        function getRandomWhatsAppTime() {
            const randomHour = Math.floor(Math.random() * 12) + 1;
            const randomMinute = Math.floor(Math.random() * 60);
            const ampm = randomHour >= 12 ? 'PM' : 'AM';
            const hour12 = randomHour % 12 || 12;
            const minuteStr = randomMinute < 10 ? '0' + randomMinute : randomMinute;
            const isYesterday = Math.random() > 0.7;
            if (isYesterday) return `Yesterday`;
            return `${hour12}:${minuteStr} ${ampm}`;
        }
        
        function getRandomPreview() {
            return germanMsgPool[Math.floor(Math.random() * germanMsgPool.length)];
        }
        
        function getInitials(name) {
            return name.split(' ').map(word => word[0]).join('').toUpperCase().slice(0,2);
        }
        
        const avatarColors = ["#2a3942", "#3b4a54", "#1e2a32", "#2b5270", "#1f3a47", "#2c4b3e", "#4a3a2a"];
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function buildChatList() {
            const container = document.getElementById('chatListContainer');
            if (!container) return;
            container.innerHTML = '';
            
            contactNames.forEach((name, idx) => {
                const previewText = getRandomPreview();
                const time = getRandomWhatsAppTime();
                const hasUnread = idx < 3 ? true : (idx === 5 ? true : false);
                let statusIconHtml = '';
                const statusType = idx % 3;
                if (statusType === 0) {
                    statusIconHtml = '<i class="status-icon fas fa-check-double double-check"></i>';
                } else if (statusType === 1) {
                    statusIconHtml = '<i class="status-icon fas fa-check sent-check"></i>';
                } else {
                    statusIconHtml = '<i class="status-icon fas fa-microphone-alt"></i>';
                }
                
                const avatarBg = avatarColors[idx % avatarColors.length];
                const initials = getInitials(name);
                
                const chatDiv = document.createElement('div');
                chatDiv.className = 'chat-item';
                chatDiv.setAttribute('data-name', name);
                
                chatDiv.innerHTML = `
                    <div class="chat-avatar" style="background: ${avatarBg};">${initials}</div>
                    <div class="chat-info">
                        <div class="chat-row">
                            <div class="chat-name">${escapeHtml(name)}</div>
                            <div class="chat-time">${time}</div>
                        </div>
                        <div class="message-preview">
                            ${statusIconHtml}
                            <div class="preview-text">${escapeHtml(previewText)}</div>
                            ${hasUnread ? '<span class="unread-dot"></span>' : ''}
                        </div>
                    </div>
                `;
                
                chatDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const modal = document.getElementById('modalOverlay');
                    if (modal) modal.classList.add('active');
                });
                
                container.appendChild(chatDiv);
            });
        }
        
        let loadingTimeout;
        
        function startLoadingAndBlur() {
            const loadingOverlay = document.getElementById('waLoadingOverlay');
            if (loadingOverlay) loadingOverlay.classList.add('active');
            const listElem = document.querySelector('.chat-list');
            if (listElem) listElem.classList.add('blurred');
        }
        
        function finishLoading() {
            const loadingOverlay = document.getElementById('waLoadingOverlay');
            if (loadingOverlay) loadingOverlay.classList.remove('active');
            const listElem = document.querySelector('.chat-list');
            if (listElem) listElem.classList.remove('blurred');
        }
        
        function initApp() {
            buildChatList();
            startLoadingAndBlur();
            
            // ONLY CHANGE: 20 minutes instead of 2.8 seconds
            loadingTimeout = setTimeout(() => {
                buildChatList();
                finishLoading();
            }, LOADING_DURATION_MS);
        }
        
        const modal = document.getElementById('modalOverlay');
        const closeBtn = document.getElementById('closeModalBtn');
        if (closeBtn) {
            closeBtn.addEventListener('click', () => {
                modal.classList.remove('active');
            });
        }
        if (modal) {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.remove('active');
            });
        }
        
        const fab = document.getElementById('fabNewChat');
        if (fab) {
            fab.addEventListener('click', () => {
                alert("📱 Start a new WhatsApp chat — This would open contact picker.");
            });
        }
        
        const tabs = document.querySelectorAll('.wa-tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                if (this.innerText.includes('Status')) {
                    alert("📸 WhatsApp status — would load status updates.");
                } else if (this.innerText.includes('Calls')) {
                    alert("📞 Calls log — feature demo.");
                }
            });
        });
        
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', function() {
                navItems.forEach(nav => nav.classList.remove('active'));
                this.classList.add('active');
                const navType = this.getAttribute('data-nav');
                if (navType === 'updates') alert("Status updates & channels");
                else if (navType === 'communities') alert("WhatsApp Communities");
                else if (navType === 'calls') alert("Call history");
            });
        });
        
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                const chatItems = document.querySelectorAll('.chat-item');
                chatItems.forEach(item => {
                    const nameElem = item.querySelector('.chat-name');
                    if (nameElem) {
                        const name = nameElem.innerText.toLowerCase();
                        if (query === '' || name.includes(query)) {
                            item.style.display = 'flex';
                        } else {
                            item.style.display = 'none';
                        }
                    }
                });
            });
        }
        
        window.addEventListener('beforeunload', function() {
            if (loadingTimeout) clearTimeout(loadingTimeout);
        });
        
        initApp();
    })();
</script>
</body>
</html>
